<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>RouteX</title>
  <meta name="description" content="RouteX - Find your bus across Tamil Nadu" />
  <meta name="author" content="RouteX" />

  <meta property="og:title" content="RouteX" />
  <meta property="og:description" content="RouteX - Find your bus across Tamil Nadu" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/icon-1024x1024.png" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="theme-color" content="#F97316" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="/routex-logo.jpg" />
  
  <link rel="preload" as="image" href="/hero-bg.png" />
  <link rel="preload" as="image" href="/routex-logo.jpg" />
  <style>
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #FFF7ED, #FFE4C7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    .splash-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 20px;
      margin-top: -10vh;
    }
    #splash-screen img.splash-logo {
      width: 100px;
      height: 100px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(249, 115, 22, 0.2);
      margin-bottom: 24px;
    }
    #splash-screen h1 {
      color: #F97316;
      margin: 0;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    #splash-screen p.splash-subtitle {
      color: #333333;
      margin: 8px 0 40px 0;
      font-size: 16px;
      font-weight: 500;
      opacity: 0.8;
    }
    .animation-container {
      position: relative;
      width: 200px;
      height: 60px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-bottom: 6px;
    }
    .bus {
      animation: busBounce 0.3s infinite alternate;
      z-index: 2;
    }
    @keyframes busBounce {
      0% { transform: translateY(0); }
      100% { transform: translateY(-2px); }
    }
    .wheel {
      animation: wheelSpin 0.5s linear infinite;
      transform-origin: center;
      transform-box: fill-box;
    }
    @keyframes wheelSpin {
      100% { transform: rotate(360deg); }
    }
    .road {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background-color: #333333;
      border-radius: 2px;
      overflow: hidden;
    }
    .road::after {
      content: '';
      position: absolute;
      top: 1px;
      left: 0;
      width: 200%;
      height: 2px;
      background: repeating-linear-gradient(90deg, transparent 0, transparent 15px, #FFF7ED 15px, #FFF7ED 30px);
      animation: moveRoad 0.6s linear infinite;
    }
    @keyframes moveRoad {
      0% { transform: translateX(0); }
      100% { transform: translateX(-30px); }
    }
  </style>
</head>

<body>
  <div id="splash-screen">
    <div class="splash-content">
      <img src="/routex-logo.jpg" alt="RouteX Logo" class="splash-logo" />
      <h1>RouteX</h1>
      <p class="splash-subtitle">Smart Bus Route & Ticket Booking</p>
      
      <div class="animation-container">
        <svg class="bus" width="80" height="40" viewBox="0 0 80 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Bus Body -->
          <path d="M5,15 Q5,5 15,5 L65,5 Q75,5 75,15 L75,30 Q75,35 70,35 L10,35 Q5,35 5,30 Z" fill="#F97316"/>
          <!-- Windows -->
          <rect x="12" y="10" width="15" height="12" rx="2" fill="#FFFFFF"/>
          <rect x="32" y="10" width="15" height="12" rx="2" fill="#FFFFFF"/>
          <rect x="52" y="10" width="15" height="12" rx="2" fill="#FFFFFF"/>
          <!-- Wheels -->
          <g class="wheel" style="transform-origin: 20px 35px;">
            <circle cx="20" cy="35" r="6" fill="#333333"/>
            <circle cx="20" cy="35" r="3" fill="#D1D5DB"/>
          </g>
          <g class="wheel" style="transform-origin: 60px 35px;">
            <circle cx="60" cy="35" r="6" fill="#333333"/>
            <circle cx="60" cy="35" r="3" fill="#D1D5DB"/>
          </g>
        </svg>
        <div class="road"></div>
      </div>
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    window.removeSplashScreen = () => {
      const splash = document.getElementById('splash-screen');
      if (splash) {
        splash.style.opacity = '0';
        splash.style.visibility = 'hidden';
        setTimeout(() => splash.remove(), 500);
      }
    };
  </script>
</body>

</html>
